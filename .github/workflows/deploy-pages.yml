name: Deploy to GitHub Pages

# Publica o conteúdo pré-buildado de dist/ na branch gh-pages a cada push na
# main. O GitHub Pages serve essa branch automaticamente. O dist/ é versionado
# no repositório (ver README → Deploy), então não é necessário rodar
# npm install/build aqui.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # git subtree split precisa do histórico completo

      - name: Publica dist/ na branch gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push origin "$(git subtree split --prefix dist main)":refs/heads/gh-pages --force
