name: e2e

on:
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Unit tests
        run: npm test

      - name: Validate pedagogy V2 (registry, packs, contracts)
        run: npm run validate:pedagogy-v2

      - name: Pedagogy V2 simulation smoke (deterministic, halts on invariant/grave)
        run: npm run simulate:pedagogy-v2 -- --scenario all --check-determinism

      - name: Build
        run: npm run build

      - name: IndexedDB benchmark
        run: npm run benchmark:indexeddb

      - name: Playwright E2E
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload traces, screenshots and videos (failures only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
